<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>My To-Do List</h1>
        <p class="tagline">Stay on top of your day.</p>
    </header>

    <main>
        <section id="todo-app" class="todo-app">
            <label for="new-task" class="visually-hidden">New task</label>
            <form class="task-form" id="task-form">
                <label for="new-task" class="visually-hidden">New task</label>
                <input type="text" id="new-task" placeholder="What needs to be done?" autocomplete="off">
                <button type="submit" id="add-task-btn">Add Task</button>
            </form>
            <span class="error-message" id="task-error"></span>

            <div class="filters" id="filters">
                <button type="button" class="filter-btn active" data-filter="all">All</button>
                <button type="button" class="filter-btn" data-filter="active">Active</button>
                <button type="button" class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <ul class="task-list" id="task-list">
                <!-- task <li> items get injected here by app.js -->
            </ul>

            <p class="empty-state" id="empty-state">No tasks yet — add one above!</p>

            <div class="task-counter" id="task-counter">
                <span id="tasks-remaining">0</span> tasks remaining
            </div>

        </section>
    </main>

    <footer>
        <p>&copy; 2026 My To-Do List.</p>
    </footer>

    <script type="module" src="app.js"></script>
</body>
</html>
